<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 980" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b" />
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#818cf8" />
    </marker>
    <marker id="arrowPink" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f472b6" />
    </marker>
    <marker id="arrowYellow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#facc15" />
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="980" fill="url(#bg)"/>

  <text x="600" y="46" text-anchor="middle" fill="#f8fafc" font-size="27" font-weight="700">BusinessPilot AI — Production Architecture</text>
  <text x="600" y="70" text-anchor="middle" fill="#94a3b8" font-size="13">Voice + chat executive assistant, powered end-to-end by Qwen Cloud (DashScope)</text>

  <!-- User -->
  <rect x="500" y="96" width="200" height="52" rx="10" fill="#334155" stroke="#64748b" stroke-width="1.5"/>
  <text x="600" y="126" text-anchor="middle" fill="#f1f5f9" font-size="15" font-weight="600">User</text>
  <text x="600" y="141" text-anchor="middle" fill="#94a3b8" font-size="10">Browser · voice or text</text>

  <line x1="600" y1="148" x2="600" y2="178" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Vercel / Next.js -->
  <rect x="430" y="180" width="340" height="64" rx="10" fill="#111827" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="600" y="206" text-anchor="middle" fill="#f8fafc" font-size="15" font-weight="600">Next.js Frontend</text>
  <text x="600" y="222" text-anchor="middle" fill="#7dd3fc" font-size="10">Vercel · App Router · TypeScript</text>
  <text x="600" y="235" text-anchor="middle" fill="#64748b" font-size="9">REST (fetch) + WebSocket (voice / notifications) — never calls Qwen directly</text>

  <line x1="600" y1="244" x2="600" y2="274" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="618" y="264" fill="#64748b" font-size="10">HTTPS (TLS via Let's Encrypt)</text>

  <!-- Alibaba ECS box -->
  <rect x="200" y="277" width="800" height="368" rx="14" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="222" y="300" fill="#fbbf24" font-size="13" font-weight="700">ALIBABA CLOUD ECS (Docker host)</text>

  <!-- Nginx -->
  <rect x="470" y="312" width="260" height="50" rx="8" fill="#1f2937" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="600" y="334" text-anchor="middle" fill="#fde68a" font-size="13" font-weight="600">Nginx Reverse Proxy</text>
  <text x="600" y="349" text-anchor="middle" fill="#94a3b8" font-size="9">HTTPS termination · Let's Encrypt · DuckDNS</text>

  <line x1="600" y1="362" x2="600" y2="390" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- FastAPI container -->
  <rect x="380" y="392" width="440" height="118" rx="10" fill="#0b3b2e" stroke="#34d399" stroke-width="1.5"/>
  <text x="600" y="416" text-anchor="middle" fill="#d1fae5" font-size="15" font-weight="700">FastAPI Backend (Docker container)</text>
  <text x="600" y="433" text-anchor="middle" fill="#6ee7b7" font-size="10">Multi-agent orchestrator · async SQLAlchemy 2.0</text>
  <text x="600" y="448" text-anchor="middle" fill="#6ee7b7" font-size="10">Orchestrator → PlannerAgent → Specialist Agents → ReviewerAgent</text>
  <text x="600" y="463" text-anchor="middle" fill="#94a3b8" font-size="9">JWT auth (access+refresh) · Fernet-encrypted OAuth tokens · rate limiting</text>
  <!-- Qwen call-out inside backend -->
  <rect x="404" y="472" width="392" height="30" rx="6" fill="#1e1b4b" stroke="#818cf8" stroke-width="1.2"/>
  <text x="600" y="491" text-anchor="middle" fill="#c7d2fe" font-size="10" font-weight="600">app/services/qwen/  →  chat.py (qwen-plus) · embeddings.py (text-embedding-v3)</text>

  <!-- connector: FastAPI -> Qwen Cloud (primary, bold) -->
  <line x1="440" y1="510" x2="345" y2="565" stroke="#818cf8" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="330" y="540" fill="#a5b4fc" font-size="9" text-anchor="end">HTTPS · DASHSCOPE_API_KEY</text>

  <!-- Qwen Cloud -->
  <rect x="240" y="568" width="230" height="90" rx="10" fill="#1e1b4b" stroke="#818cf8" stroke-width="2"/>
  <text x="355" y="592" text-anchor="middle" fill="#e0e7ff" font-size="14" font-weight="700">Qwen Cloud</text>
  <text x="355" y="608" text-anchor="middle" fill="#a5b4fc" font-size="10">DashScope API (dashscope-intl.aliyuncs.com)</text>
  <text x="355" y="623" text-anchor="middle" fill="#a5b4fc" font-size="10">qwen-plus — planning, tool-calling, drafting</text>
  <text x="355" y="638" text-anchor="middle" fill="#a5b4fc" font-size="10">text-embedding-v3 — 1536-dim memory vectors</text>
  <text x="355" y="653" text-anchor="middle" fill="#818cf8" font-size="9">Only server-side caller — never exposed to frontend</text>

  <!-- Qwen -> Database (embeddings persisted) -->
  <line x1="470" y1="610" x2="655" y2="610" stroke="#818cf8" stroke-width="2" stroke-dasharray="3 3" marker-end="url(#arrowBlue)"/>
  <text x="562" y="602" text-anchor="middle" fill="#a5b4fc" font-size="9">embedding vectors persisted</text>

  <!-- Google APIs -->
  <rect x="490" y="568" width="160" height="90" rx="10" fill="#1e1b4b" stroke="#f472b6" stroke-width="1.5"/>
  <text x="570" y="592" text-anchor="middle" fill="#fce7f3" font-size="13" font-weight="600">Google APIs</text>
  <text x="570" y="608" text-anchor="middle" fill="#f9a8d4" font-size="10">Gmail · Calendar</text>
  <text x="570" y="623" text-anchor="middle" fill="#f9a8d4" font-size="10">OAuth 2.0</text>
  <text x="570" y="640" text-anchor="middle" fill="#f472b6" font-size="9">tokens encrypted at rest</text>
  <line x1="530" y1="510" x2="570" y2="565" stroke="#f472b6" stroke-width="2" marker-end="url(#arrowPink)"/>

  <!-- Database -->
  <rect x="660" y="568" width="170" height="90" rx="10" fill="#1e1b4b" stroke="#facc15" stroke-width="1.5"/>
  <text x="745" y="592" text-anchor="middle" fill="#fef9c3" font-size="13" font-weight="600">Database (SQLite)</text>
  <text x="745" y="608" text-anchor="middle" fill="#fde047" font-size="10">users · memory_items</text>
  <text x="745" y="623" text-anchor="middle" fill="#fde047" font-size="10">email_drafts · calendar_drafts</text>
  <text x="745" y="640" text-anchor="middle" fill="#facc15" font-size="9">embedding_json + cosine similarity search</text>
  <line x1="670" y1="510" x2="745" y2="565" stroke="#facc15" stroke-width="2" marker-end="url(#arrowYellow)"/>

  <!-- Scheduler -->
  <rect x="850" y="568" width="130" height="90" rx="10" fill="#1e1b4b" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="915" y="592" text-anchor="middle" fill="#e0f2fe" font-size="13" font-weight="600">Scheduler</text>
  <text x="915" y="608" text-anchor="middle" fill="#7dd3fc" font-size="10">APScheduler</text>
  <text x="915" y="623" text-anchor="middle" fill="#7dd3fc" font-size="10">meeting reminders</text>
  <text x="915" y="640" text-anchor="middle" fill="#7dd3fc" font-size="9">runs in-process</text>
  <line x1="750" y1="510" x2="915" y2="565" stroke="#38bdf8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- MemoryAgent RAG loop callout -->
  <rect x="240" y="670" width="590" height="46" rx="8" fill="#0b1220" stroke="#818cf8" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="535" y="688" text-anchor="middle" fill="#c7d2fe" font-size="10" font-weight="600">MemoryAgent RAG loop: embed_text(query) via Qwen → cosine-similarity search over Database → inject top facts into next qwen-plus prompt</text>
  <text x="535" y="703" text-anchor="middle" fill="#94a3b8" font-size="9">Frontend and Database never call Qwen directly — every Qwen call is proxied and authenticated by the FastAPI backend</text>

  <!-- WebSocket note -->
  <rect x="820" y="392" width="150" height="90" rx="10" fill="#1f2937" stroke="#64748b" stroke-width="1.5"/>
  <text x="895" y="414" text-anchor="middle" fill="#f1f5f9" font-size="12" font-weight="600">WebSocket</text>
  <text x="895" y="431" text-anchor="middle" fill="#94a3b8" font-size="9">/voice/ws</text>
  <text x="895" y="446" text-anchor="middle" fill="#94a3b8" font-size="9">/notifications/ws</text>
  <text x="895" y="461" text-anchor="middle" fill="#94a3b8" font-size="9">token-first-message auth</text>
  <line x1="820" y1="432" x2="782" y2="432" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Vercel label -->
  <rect x="220" y="740" width="230" height="56" rx="10" fill="none" stroke="#38bdf8" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="335" y="763" text-anchor="middle" fill="#7dd3fc" font-size="12" font-weight="700">VERCEL</text>
  <text x="335" y="779" text-anchor="middle" fill="#94a3b8" font-size="9">Frontend hosting + global CDN</text>

  <!-- Human approval note -->
  <rect x="700" y="740" width="300" height="72" rx="10" fill="none" stroke="#f43f5e" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="850" y="761" text-anchor="middle" fill="#fda4af" font-size="12" font-weight="700">HUMAN-IN-THE-LOOP GATE</text>
  <text x="850" y="777" text-anchor="middle" fill="#94a3b8" font-size="9">Email sends &amp; calendar events are written as</text>
  <text x="850" y="791" text-anchor="middle" fill="#94a3b8" font-size="9">pending_approval only — Qwen drafts, it never sends</text>
  <text x="850" y="805" text-anchor="middle" fill="#94a3b8" font-size="9">without explicit user approval via /approve</text>

  <text x="600" y="856" text-anchor="middle" fill="#475569" font-size="11">Text chat and voice share one pipeline: Orchestrator → Planner → Specialist Agents (Memory/Document/Research/Marketing/Email/Calendar) → Reviewer</text>
  <text x="600" y="874" text-anchor="middle" fill="#475569" font-size="11">Approval gating is structural, not prompted: side-effecting actions only ever run from an explicit /approve endpoint</text>
  <text x="600" y="900" text-anchor="middle" fill="#334155" font-size="10">Qwen Cloud (DashScope) is the sole model provider: reasoning, tool-calling, drafting, and embeddings all route through it — no other LLM vendor is used</text>
</svg>
